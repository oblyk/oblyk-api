subscription_active:
  for_gym_type: private
  month_by_occurrence: 1
  start_date: <%= Date.current - 5.days %>
  payment_status: paid

subscription_expired:
  for_gym_type: private
  month_by_occurrence: 1
  start_date: <%= Date.current - 2.months %>
  end_date: <%= Date.current - 1.month %>
  payment_status: paid

subscription_free_trial:
  for_gym_type: private
  month_by_occurrence: 1
  start_date: <%= Date.current - 2.days %>
  trial_end_date: <%= Date.current + 5.days %>
  payment_status: waiting_first_payment
