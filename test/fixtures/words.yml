with_fingers:
  name: À doigts
  definition: Une escalade ou un passage qui nécessite de la force dans les doigts. Et c'est les meilleurs blocs

on_sight:
  name: À vue
  definition: Réussir à enchaîner une voie dès le premier essai, sans connaître les difficultés. Cet exercice requiert une bonne lecture du rocher et sert de référence pour le niveau maximum d'un grimpeur.
