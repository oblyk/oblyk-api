  end_date: <%= Date.current + 10.days %>
  subscription_start_date: <%= Date.current - 5.days %>
  subscription_end_date: <%= Date.current + 5.days %>
  categorization_type: "official_under_age"
  draft: false
  private: false

contest_ongoing:
